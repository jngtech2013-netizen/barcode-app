name: Keep Streamlit app awake

# Streamlit Community Cloud 앱이 비활성으로 슬립에 빠지지 않도록
# 실제 브라우저(Playwright)로 주기적으로 방문한다.
on:
  schedule:
    # 15분마다 (UTC 기준이지만 하루 종일 도므로 시간대 무관).
    # Private 레포라 무료 분(2,000분/월)이 부담되면 '*/20' 또는 '*/30'으로 늘리세요.
    - cron: '*/15 * * * *'
  workflow_dispatch: {} # 수동 실행 버튼

# 동시에 여러 번 도는 것 방지
concurrency:
  group: keep-awake
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright (chromium)
        run: |
          npm init -y
          npm install playwright@latest
          npx playwright install --with-deps chromium

      - name: Visit app
        env:
          APP_URL: https://barcode-app-khtraucisdge7xezgwdpxy.streamlit.app/
        run: node scripts/keep-awake.mjs
